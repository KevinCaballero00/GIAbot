<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIAbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 40px; }
        #chat-box { width: 400px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); overflow: hidden; }
        #header { background: #003366; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
        #messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; word-wrap: break-word; }
        .user { background: #003366; color: white; align-self: flex-end; }
        .bot { background: #e8e8e8; color: #333; align-self: flex-start; }
        #input-area { display: flex; padding: 12px; border-top: 1px solid #ddd; gap: 8px; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #send-btn { padding: 10px 18px; background: #003366; color: white; border: none; border-radius: 20px; cursor: pointer; }
        #send-btn:hover { background: #004499; }
    </style>
</head>
<body>
<div id="chat-box">
    <div id="header">🤖 GIAbot</div>
    <div id="messages">
        <div class="msg bot">¡Hola! Soy GIAbot 👋 </div>
        <div [innerHTML]="message"></div>
    </div>
    <div id="input-area">
        <input id="user-input" type="text" placeholder="Escribe tu pregunta..."
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    let history = [];

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        try {
            const response = await fetch("http://localhost:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, history: history })
            });
            const data = await response.json();
            addMessage(data.reply, "bot");
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: data.reply });
        } catch (error) {
            addMessage("❌ Error conectando con el servidor.", "bot");
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = "msg " + sender;
        div.textContent = text;
        const messages = document.getElementById("messages");
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
